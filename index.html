<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Document</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { display: flex; flex-direction: column; background: #1c1c1e; color: #fff; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 12px 16px; background: #000; flex: 0 0 auto;
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; }
    header a {
      background: #0a84ff; color: #fff; text-decoration: none;
      padding: 8px 14px; border-radius: 8px; font-size: 14px; font-weight: 600;
      white-space: nowrap;
    }
    main { flex: 1 1 auto; min-height: 0; }
    iframe, embed { width: 100%; height: 100%; border: 0; }
    .fallback {
      padding: 40px 20px; text-align: center; line-height: 1.6;
    }
    .fallback a { color: #0a84ff; }
  </style>
</head>
<body>
  <header>
    <h1>Document</h1>
    <a href="document.pdf" target="_blank" rel="noopener">Ouvrir le PDF</a>
  </header>
  <main>
    <!-- Affiche le PDF directement dans la page (desktop + la plupart des mobiles) -->
    <embed src="document.pdf" type="application/pdf" />
    <div class="fallback">
      Si le document ne s'affiche pas,
      <a href="document.pdf" target="_blank" rel="noopener">cliquez ici pour l'ouvrir</a>.
    </div>
  </main>
</body>
</html>
