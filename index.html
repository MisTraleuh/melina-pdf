<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vidéo</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { display: flex; align-items: center; justify-content: center; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: contain; background: #000; }

    /* Bouton "activer le son" : visible tant que la vidéo est en sourdine */
    #sound {
      position: fixed; inset: 0; margin: auto;
      width: max-content; height: max-content;
      display: flex; align-items: center; gap: 10px;
      padding: 16px 24px; border: 0; border-radius: 999px;
      background: rgba(10, 132, 255, 0.95); color: #fff;
      font-size: 17px; font-weight: 600; cursor: pointer;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    }
    #sound.hidden { display: none; }
  </style>
</head>
<body>
  <video id="v" src="video.mp4" autoplay muted playsinline controls preload="auto"></video>

  <button id="sound" type="button">🔊 Activer le son</button>

  <script>
    const v = document.getElementById('v');
    const btn = document.getElementById('sound');

    // Lance la lecture dès l'arrivée (muet = autorisé par tous les navigateurs).
    const tryPlay = () => { v.play().catch(() => {}); };
    tryPlay();
    document.addEventListener('visibilitychange', () => { if (!document.hidden) tryPlay(); });

    // Active le son au premier contact, puis cache le bouton.
    const enableSound = () => {
      v.muted = false;
      v.volume = 1;
      v.play().catch(() => {});
      btn.classList.add('hidden');
    };
    btn.addEventListener('click', enableSound);

    // Si l'utilisateur (re)joue avec le son via les contrôles natifs, on synchronise le bouton.
    v.addEventListener('volumechange', () => {
      if (!v.muted) btn.classList.add('hidden');
      else btn.classList.remove('hidden');
    });
  </script>
</body>
</html>
